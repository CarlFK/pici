---
- name: install packages on server
  apt:
    name:
      - qemu-user-static
  tags:
  - qemu

- name: install scripts to manage pi states
  copy:
    src: "scripts/{{ item }}"
    dest: "/usr/local/sbin/{{ item }}"
    mode: preserve
  with_items:
   - maintenance.sh
   - production.sh
   - chroot-mount-pi-fs.bash
  tags:
  - manage
  - qemu

- name: put the pi boot system into maintenance mode
  command: maintenance.sh
  when: False
